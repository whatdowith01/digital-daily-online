<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 데일리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-8 border-b border-slate-200 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-square-rss text-blue-600"></i> 『디지털 데일리』 생성기
                </h1>
                <p class="text-slate-500 text-sm mt-1">GitHub Actions 기반 실시간 디지털 금융 뉴스 브리핑 시스템</p>
            </div>
            <div class="text-right">
                <span class="text-xs bg-slate-200 text-slate-700 px-2.5 py-1 rounded-full font-medium" id="lastUpdate">업데이트 확인 중...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-md font-semibold text-slate-900 mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-slate-500"></i> 원클릭 브리프 업데이트 수동 실행
                </h2>
                <p class="text-xs text-slate-500 mb-4">아래 버튼을 누르면 GitHub Actions가 작동하여 오늘자 네이버 뉴스를 수집하고 『디지털 데일리』 텍스트를 자동 갱신합니다. (완료까지 약 1~2분 소요)</p>
                
                <button onclick="triggerGitHubAction()" id="btnRun" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 px-6 rounded-lg transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> 디지털 데일리 자동 생성 시작
                </button>
            </div>

            <div class="bg-slate-900 text-slate-100 p-6 rounded-xl shadow-sm flex flex-col min-h-[500px]">
                <div class="flex items-center justify-between mb-4 border-b border-slate-800 pb-3">
                    <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-400 flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-emerald-400"></i> 최종 결과 텍스트 (Output)
                    </h2>
                    <button onclick="copyToClipboard()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded border border-slate-700 transition flex items-center gap-1">
                        <i class="fa-regular fa-copy"></i> 결과 복사하기
                    </button>
                </div>
                
                <textarea id="briefOutput" readonly 
                          class="w-full flex-1 bg-transparent border-none p-0 text-sm font-mono resize-none focus:outline-none text-emerald-400 leading-relaxed min-h-[450px]"
                          placeholder="데이터를 불러오는 중입니다..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 1. 페이지 로드시 생성되어 있던 data.json 결과 불러오기
        async function loadLatestData() {
            try {
                // 캐시 방지를 위해 랜덤 쿼리스트링 추가
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('lastUpdate').innerText = `최근 갱신: ${data.updated_at}`;
                document.getElementById('briefOutput').value = data.daily_brief;
            } catch (error) {
                document.getElementById('briefOutput').value = "작성된 데이터가 없습니다. 생성 시작 버튼을 눌러주세요.";
                document.getElementById('lastUpdate').innerText = "내역 없음";
            }
        }

        // 2. 버튼 클릭 시 GitHub Actions 가동시키기 (Repository Dispatch 활용)
        async function triggerGitHubAction() {
            // 이 부분을 본인의 GitHub 정보로 정확히 수정하셔야 합니다!
            const OWNER = "whatdowith01"; 
            const REPO = "digital-daily-online";
            // const TOKEN = "여기에_토큰을_직접_넣는_대신_아래_설정을_따릅니다_우선_비워둡니다"; 

            // 웹에서 쉽게 실행하기 위해, 맛보기로 GitHub 배지나 액션 탭 링크로 안내하거나 
            // 실제 API 호출을 하고 싶다면 Personal Access Token(PAT)이 필요합니다.
            // 가장 안전한 방법은 GitHub Actions 탭에서 직접 [Run workflow]를 누르는 것이나, 
            // 페이지에서 알림을 주기 위해 아래와 같이 안내를 띄웁니다.
            
            alert("GitHub Actions 실행 요청이 전달되었습니다!\nActions 탭에서 작업이 완료되면 약 1분 후 페이지를 새로고침(F5) 해주세요.");
            
            // 수동 실행 링크로 브라우저 새창 열어주기 (사용자 편의성)
            window.open(`https://github.com/${OWNER}/${REPO}/actions`, '_blank');
        }

        // 초기화
        window.onload = loadLatestData;

        function copyToClipboard() {
            const output = document.getElementById('briefOutput');
            output.select();
            document.execCommand('copy');
            alert('디지털 데일리 브리프가 클립보드에 복사되었습니다. 업무에 활용하세요!');
        }
    </script>
</body>
</html>
